<svg width="100%" viewBox="0 0 1320 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>assay architecture</title>
<desc>assay evaluates two kinds of target. An MCP server (teal) and an AI agent (purple) each pass through a thin adapter into the shared, framework-agnostic core (slate): it loads a YAML suite, runs it against the target, scores it with checks or metrics, and emits a console/JSON report plus a CI pass/fail exit code (green).</desc>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;}.h{font-size:15px;font-weight:600;}.s{font-size:12px;font-weight:400;}.lg{font-size:13px;font-weight:400;}</style>
</defs>

<text class="s" x="60" y="60" fill="#6e6e6a">what you test</text>

<rect x="60" y="92" width="190" height="64" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text class="h" x="155" y="118" text-anchor="middle" fill="#085041">MCP server</text>
<text class="s" x="155" y="138" text-anchor="middle" fill="#0F6E56">your tool server</text>

<rect x="60" y="300" width="190" height="64" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text class="h" x="155" y="326" text-anchor="middle" fill="#3C3489">AI agent</text>
<text class="s" x="155" y="346" text-anchor="middle" fill="#534AB7">ADK or your own</text>

<line x1="250" y1="124" x2="298" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="250" y1="332" x2="298" y2="332" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="300" y="92" width="170" height="64" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text class="h" x="385" y="118" text-anchor="middle" fill="#444441">mcp adapter</text>
<text class="s" x="385" y="138" text-anchor="middle" fill="#5F5E5A">implements ToolServer</text>

<rect x="300" y="300" width="170" height="64" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text class="h" x="385" y="326" text-anchor="middle" fill="#444441">adk adapter</text>
<text class="s" x="385" y="346" text-anchor="middle" fill="#5F5E5A">implements Agent</text>

<line x1="470" y1="124" x2="540" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="470" y1="332" x2="540" y2="332" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="505" y1="124" x2="505" y2="332" stroke="#888780" stroke-width="1.5"/>

<rect x="540" y="64" width="430" height="328" rx="14" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
<text class="h" x="755" y="92" text-anchor="middle" fill="#FFFFFF" font-size="16">assay core</text>
<text class="s" x="755" y="112" text-anchor="middle" fill="#B4B2A9">framework-agnostic, Go stdlib only</text>

<rect x="580" y="138" width="350" height="50" rx="8" fill="#3A3A37" stroke="#6E6E6A" stroke-width="0.75"/>
<text class="h" x="755" y="156" text-anchor="middle" fill="#F1EFE8">suite loader</text>
<text class="s" x="755" y="174" text-anchor="middle" fill="#B4B2A9">reads YAML cases / checks</text>

<line x1="755" y1="188" x2="755" y2="210" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="580" y="210" width="350" height="50" rx="8" fill="#3A3A37" stroke="#6E6E6A" stroke-width="0.75"/>
<text class="h" x="755" y="228" text-anchor="middle" fill="#F1EFE8">runner</text>
<text class="s" x="755" y="246" text-anchor="middle" fill="#B4B2A9">drives the target, collects results</text>

<line x1="755" y1="260" x2="755" y2="282" stroke="#9C9A92" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="580" y="282" width="170" height="68" rx="8" fill="#143A33" stroke="#1D9E75" stroke-width="0.75"/>
<text class="h" x="665" y="304" text-anchor="middle" fill="#9FE1CB">checks</text>
<text class="s" x="665" y="322" text-anchor="middle" fill="#5DCAA5">tools_list,</text>
<text class="s" x="665" y="338" text-anchor="middle" fill="#5DCAA5">tool_call</text>

<rect x="760" y="282" width="170" height="68" rx="8" fill="#241F3A" stroke="#7F77DD" stroke-width="0.75"/>
<text class="h" x="845" y="304" text-anchor="middle" fill="#CECBF6">metrics</text>
<text class="s" x="845" y="322" text-anchor="middle" fill="#AFA9EC">tool correctness,</text>
<text class="s" x="845" y="338" text-anchor="middle" fill="#AFA9EC">output, latency</text>

<line x1="970" y1="200" x2="1018" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="970" y1="256" x2="1018" y2="256" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<text class="s" x="1020" y="60" fill="#6e6e6a">what you get</text>

<rect x="1020" y="168" width="240" height="64" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text class="h" x="1140" y="194" text-anchor="middle" fill="#0C447C">scored report</text>
<text class="s" x="1140" y="214" text-anchor="middle" fill="#185FA5">console + JSON</text>

<rect x="1020" y="252" width="240" height="64" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text class="h" x="1140" y="278" text-anchor="middle" fill="#27500A">CI pass / fail</text>
<text class="s" x="1140" y="298" text-anchor="middle" fill="#3B6D11">exit code 0 or 1</text>

<rect x="60" y="560" width="1200" height="120" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="5 4"/>
<text class="h" x="84" y="588" fill="#5F5E5A">legend</text>

<rect x="84" y="610" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.75"/>
<text class="lg" x="108" y="617" dominant-baseline="central" fill="#5F5E5A">MCP server track</text>

<rect x="320" y="610" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
<text class="lg" x="344" y="617" dominant-baseline="central" fill="#5F5E5A">AI agent track</text>

<rect x="540" y="610" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.75"/>
<text class="lg" x="564" y="617" dominant-baseline="central" fill="#5F5E5A">thin adapter (per framework)</text>

<rect x="860" y="610" width="14" height="14" rx="3" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.75"/>
<text class="lg" x="884" y="617" dominant-baseline="central" fill="#5F5E5A">shared agnostic core</text>

<rect x="1120" y="610" width="14" height="14" rx="3" fill="#EAF3DE" stroke="#639922" stroke-width="0.75"/>
<text class="lg" x="1144" y="617" dominant-baseline="central" fill="#5F5E5A">output</text>

<text class="lg" x="84" y="652" dominant-baseline="central" fill="#5F5E5A">Adapters implement one interface — ToolServer (MCP) or Agent (agents) — so the core stays framework-agnostic.</text>
<text class="lg" x="84" y="670" dominant-baseline="central" fill="#5F5E5A">MCP checks are deterministic and need no API key; agent metrics score a real run.</text>
</svg>
